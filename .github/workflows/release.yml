name: Build & Release Mac Agent

on:
  push:
    branches:
      - main          # build a new release on every commit to main
    tags:
      - 'v*'          # also honour manual: git tag v2.0.0 && git push --tags

permissions:
  contents: write

jobs:
  build:
    name: Build Mac agent binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to inspect existing tags

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Triggered by a manual tag push – use it as-is
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # Triggered by a branch push – auto-increment the patch number
            LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
            if [[ -z "$LATEST" ]]; then
              LATEST="v0.0.0"
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Fetch dependencies
        working-directory: ./agent
        run: go mod tidy

      - name: Build – Apple Silicon (arm64)
        working-directory: ./agent
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: |
          go build \
            -ldflags="-s -w \
              -X main.configServerURL=${{ secrets.CONFIG_SERVER_URL }} \
              -X main.adminToken=${{ secrets.ADMIN_TOKEN }} \
              -X main.agentVersion=${{ steps.version.outputs.tag }} \
              -X main.githubRepo=${{ github.repository }}" \
            -trimpath \
            -o ../dist/agent-darwin-arm64 \
            .

      - name: Build – Intel (amd64)
        working-directory: ./agent
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build \
            -ldflags="-s -w \
              -X main.configServerURL=${{ secrets.CONFIG_SERVER_URL }} \
              -X main.adminToken=${{ secrets.ADMIN_TOKEN }} \
              -X main.agentVersion=${{ steps.version.outputs.tag }} \
              -X main.githubRepo=${{ github.repository }}" \
            -trimpath \
            -o ../dist/agent-darwin-amd64 \
            .

      - name: Generate checksums
        working-directory: ./dist
        run: sha256sum agent-darwin-arm64 agent-darwin-amd64 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/agent-darwin-arm64
            dist/agent-darwin-amd64
            dist/checksums.txt
          body: |
            ## mymac agent ${{ steps.version.outputs.tag }}

            ### Installation

            On each Mac, run:
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```

            ### Binaries
            - `agent-darwin-arm64` – Apple Silicon (M1/M2/M3/M4)
            - `agent-darwin-amd64` – Intel Mac

            Verify with `dist/checksums.txt`.
          draft: false
          prerelease: false

      - name: Publish release info to Vercel config server
        working-directory: ./dist
        env:
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
          CONFIG_SERVER_URL: ${{ secrets.CONFIG_SERVER_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          ARM64_SHA=$(grep agent-darwin-arm64 checksums.txt | awk '{print $1}')
          AMD64_SHA=$(grep agent-darwin-amd64 checksums.txt | awk '{print $1}')
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          curl -fsSL -X POST "${CONFIG_SERVER_URL}/api/release" \
            -H "x-admin-token: ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"version\":     \"${TAG}\",
              \"arm64Url\":    \"${BASE_URL}/agent-darwin-arm64\",
              \"amd64Url\":    \"${BASE_URL}/agent-darwin-amd64\",
              \"arm64Sha256\": \"${ARM64_SHA}\",
              \"amd64Sha256\": \"${AMD64_SHA}\"
            }"
